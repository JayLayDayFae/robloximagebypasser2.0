<!DOCTYPE html>
<html>
<head>
    <title>BypassrV4</title>
    <style>
        body { font-family: serif; margin: 10px; }
        .preview-card { border: 1px solid black; margin-bottom: 20px; padding: 5px; display: inline-block; vertical-align: top; }
        .output-item { border: 1px solid black; padding: 5px; margin-top: 5px; display: flex; align-items: center; gap: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>BypassrV4</h1>

    <div>
        Files: <input type="file" id="imageInput" multiple accept="image/*">
    </div>

    <hr>

    <div id="preview-container"></div>
    
    <button id="convertBtn" style="display:none;">CONVERT ALL</button>

    <hr>

    <div id="output-container"></div>

    <canvas id="procCanvas"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const convertBtn = document.getElementById('convertBtn');
        const outputContainer = document.getElementById('output-container');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d');

        let imageBatch = [];

        imageInput.addEventListener('change', (e) => {
            previewContainer.innerHTML = '';
            imageBatch = [];
            const files = Array.from(e.target.files);
            if(files.length > 0) convertBtn.style.display = 'block';

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const id = "img_" + index;
                        const cleanName = file.name.split('.')[0];
                        imageBatch.push({ id, img, file, originalName: cleanName });

                        const card = document.createElement('div');
                        card.className = 'preview-card';
                        card.innerHTML = `
                            <img src="${event.target.result}" height="80"><br>
                            Name: <input type="text" id="name_${id}" value="${cleanName}"><br>
                            Size: <span id="sLabel_${id}">12</span> Studs <input type="range" id="scale_${id}" min="1" max="100" value="12" oninput="document.getElementById('sLabel_${id}').innerText=this.value"><br>
                            Res: <span id="rLabel_${id}">150</span>px <input type="range" id="res_${id}" min="1" max="300" value="150" oninput="document.getElementById('rLabel_${id}').innerText=this.value"><br>
                            <input type="checkbox" id="double_${id}"> Double Sided
                        `;
                        previewContainer.appendChild(card);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        convertBtn.addEventListener('click', () => {
            outputContainer.innerHTML = '<b>Outputs:</b>';

            imageBatch.forEach(item => {
                const finalName = document.getElementById(`name_${item.id}`).value;
                const procRes = parseInt(document.getElementById(`res_${item.id}`).value);
                const gameScale = parseFloat(document.getElementById(`scale_${item.id}`).value);

                const ratio = item.img.height / item.img.width;
                canvas.width = procRes;
                canvas.height = Math.floor(procRes * ratio);

                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.drawImage(item.img, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0,0, canvas.width, canvas.height).data;
                
                let frames = "";
                let count = 0;

                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const i = (y * canvas.width + x) * 4;
                        if (imgData[i+3] > 127) { // Only pixels with alpha
                            const r = imgData[i] / 255;
                            const g = imgData[i+1] / 255;
                            const b = imgData[i+2] / 255;

                            frames += `
            <Item class="Frame" referent="PX${count}">
                <Properties>
                    <string name="Name">P</string>
                    <Color3 name="BackgroundColor3">
                        <R>${r}</R><G>${g}</G><B>${b}</B>
                    </Color3>
                    <UDim2 name="Position">
                        <XS>0</XS><XO>${x}</XO>
                        <YS>0</YS><YO>${y}</YO>
                    </UDim2>
                    <UDim2 name="Size">
                        <XS>0</XS><XO>1</XO>
                        <YS>0</YS><YO>1</YO>
                    </UDim2>
                    <float name="BackgroundTransparency">0</float>
                    <int name="BorderSizePixel">0</int>
                </Properties>
            </Item>`;
                            count++;
                        }
                    }
                }

                // Final RBXM Structure: Part -> SurfaceGui -> Frames
                const rbxm = `<roblox version="4">
    <Item class="Part" referent="MAIN_PART">
        <Properties>
            <string name="Name">${finalName}</string>
            <Vector3 name="size">
                <X>${gameScale}</X>
                <Y>${gameScale * ratio}</Y>
                <Z>0.2</Z>
            </Vector3>
            <bool name="Anchored">true</bool>
        </Properties>
        <Item class="SurfaceGui" referent="SGUI">
            <Properties>
                <string name="Name">MakerGui</string>
                <Vector2 name="CanvasSize">
                    <X>${canvas.width}</X>
                    <Y>${canvas.height}</Y>
                </Vector2>
            </Properties>
            ${frames}
        </Item>
    </Item>
</roblox>`;

                const pill = document.createElement('div');
                pill.className = 'output-item';
                pill.innerHTML = `
                    <img src="${item.img.src}" height="30">
                    <span>${finalName}.rbxm</span>
                    <button onclick="const a=document.createElement('a');a.href='data:text/xml;charset=utf-8,${encodeURIComponent(rbxm)}';a.download='${finalName}.rbxm';a.click();">Download RBXM</button>
                `;
                outputContainer.appendChild(pill);
            });
        });
    </script>

</body>
</html>
