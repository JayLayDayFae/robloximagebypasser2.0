<!DOCTYPE html>
<html>
<head>
    <title>Roblox Decal Bypass</title>
    <style>
        body { font-family: serif; margin: 10px; }
        .preview-card { border: 1px solid black; margin-bottom: 20px; padding: 5px; display: inline-block; vertical-align: top; }
        .output-item { border: 1px solid black; padding: 5px; margin-top: 5px; display: flex; align-items: center; gap: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>Roblox Decal Bypass</h1>

    <div>
        Files: <input type="file" id="imageInput" multiple accept="image/*">
    </div>

    <hr>

    <div id="preview-container"></div>
    
    <button id="convertBtn" style="display:none;">CONVERT ALL</button>

    <hr>

    <div id="output-container"></div>

    <canvas id="procCanvas"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const convertBtn = document.getElementById('convertBtn');
        const outputContainer = document.getElementById('output-container');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d');

        let imageBatch = [];

        imageInput.addEventListener('change', (e) => {
            previewContainer.innerHTML = '';
            imageBatch = [];
            const files = Array.from(e.target.files);
            if(files.length > 0) convertBtn.style.display = 'block';

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const id = "img_" + index;
                        const cleanName = file.name.split('.')[0];
                        imageBatch.push({ id, img, file, originalName: cleanName });

                        const card = document.createElement('div');
                        card.className = 'preview-card';
                        card.innerHTML = `
                            <img src="${event.target.result}" height="80"><br>
                            Name: <input type="text" id="name_${id}" value="${cleanName}"><br>
                            Size: <span id="sLabel_${id}">12</span> Studs <input type="range" id="scale_${id}" min="1" max="100" value="12" oninput="document.getElementById('sLabel_${id}').innerText=this.value"><br>
                            Res: <span id="rLabel_${id}">150</span>px <input type="range" id="res_${id}" min="1" max="300" value="150" oninput="document.getElementById('rLabel_${id}').innerText=this.value"><br>
                            <input type="checkbox" id="part_${id}" checked> Add Part
                        `;
                        previewContainer.appendChild(card);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        convertBtn.addEventListener('click', () => {
            outputContainer.innerHTML = '<b>Outputs:</b>';

            imageBatch.forEach(item => {
                const finalName = document.getElementById(`name_${item.id}`).value;
                const procRes = parseInt(document.getElementById(`res_${item.id}`).value);
                const gameScale = document.getElementById(`scale_${item.id}`).value;
                const addPart = document.getElementById(`part_${item.id}`).checked;

                const ratio = item.img.height / item.img.width;
                canvas.width = procRes;
                canvas.height = procRes * ratio;

                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.drawImage(item.img, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0,0, canvas.width, canvas.height).data;
                
                let lua = `local Data = {\n  Name = "${finalName}",\n  Scale = ${gameScale},\n  AddPart = ${addPart},\n  Pixels = {\n`;
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const i = (y * canvas.width + x) * 4;
                        // Only include pixels that aren't fully transparent
                        if (imgData[i+3] > 0) {
                            lua += `    {Vector2.new(${x},${y}), Color3.fromRGB(${imgData[i]},${imgData[i+1]},${imgData[i+2]})},\n`;
                        }
                    }
                }
                lua += "  }\n}\nreturn Data";

                const pill = document.createElement('div');
                pill.className = 'output-item';
                pill.innerHTML = `
                    <img src="${item.img.src}" height="30">
                    <span>${finalName}.lua</span>
                    <button onclick="const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,${encodeURIComponent(lua)}';a.download='${finalName}.lua';a.click();">Download</button>
                `;
                outputContainer.appendChild(pill);
            });
        });
    </script>

</body>
</html>
